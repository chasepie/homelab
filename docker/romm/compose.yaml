services:
  romm:
    image: rommapp/romm:latest
    container_name: romm
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=romm-db
      - DB_NAME=romm
      - DB_USER=romm-user
      - DB_PASSWD=${MARIADB_PASSWORD}
    volumes:
      - /srv/docker/romm/assets:/romm/assets
      - /srv/docker/romm/config:/romm/config
      - /srv/docker/romm/romm_redis_data:/redis-data
      - /srv/docker/romm/romm_resources:/romm/resources
      - /mnt/unas-pro/romm-library:/romm/library
    ports:
      - 8280:8080
    depends_on:
      romm-db:
        condition: service_healthy
        restart: true

  romm-db:
    image: mariadb:latest
    container_name: romm-db
    restart: unless-stopped
    env_file: .env
    environment:
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
    volumes:
      - /srv/docker/romm/mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5
