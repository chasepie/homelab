services:
  app:
    image: "docker.io/jc21/nginx-proxy-manager:latest"
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      - TZ=America/Detroit
    volumes:
      - /mnt/main/appdata/nginx-proxy-manager/data:/data
      - /mnt/main/appdata/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s

# docker network create npm
networks:
  default:
    external: true
    name: npm
