services:
  healthchecks-io:
    image: alpine:latest
    container_name: healthchecks-io
    restart: unless-stopped
    environment:
      HEALTHCHECKS_URL: ${HEALTHCHECKS_URL}
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl && \
        curl -fsS -m 10 --retry 5 -o /dev/null $HEALTHCHECKS_URL && \
        echo "*/5 * * * * curl -fsS -m 10 --retry 5 -o /dev/null $HEALTHCHECKS_URL" | crontab - && \
        crond -f -l 2
